<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A7._.GD mini EDR PRO | Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base:#050505;--bg-surface:#0a0a0c;--bg-panel:#121214;
      --border:rgba(255,255,255,0.08);--border-highlight:rgba(255,255,255,0.15);
      --text-primary:#f4f4f5;--text-secondary:#a1a1aa;--text-muted:#71717a;
      --accent:#00e5ff;--accent-glow:rgba(0,229,255,0.2);
      --critical:#ff2a55;--transition:0.3s cubic-bezier(0.4,0,0.2,1);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;animation:gridPan 25s linear infinite}
    @keyframes gridPan{0%{background-position:0 0}100%{background-position:40px 40px}}
    .orb{position:fixed;z-index:0;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
    .orb-1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation:orbFloat 8s ease-in-out infinite alternate}
    .orb-2{width:300px;height:300px;background:#7c3aed;bottom:-80px;right:-80px;animation:orbFloat 11s ease-in-out infinite alternate-reverse}
    @keyframes orbFloat{from{transform:translate(0,0)}to{transform:translate(40px,30px)}}
    .card{position:relative;z-index:1;background:var(--bg-panel);border:1px solid var(--border-highlight);border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 0 0 1px rgba(0,229,255,0.06),0 24px 64px rgba(0,0,0,0.7);animation:cardIn .5s cubic-bezier(0.16,1,0.3,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:32px}
    .logo-wrap img{width:110px;height:auto;filter:drop-shadow(0 0 12px rgba(0,229,255,0.35))}
    .logo-badge{display:flex;align-items:center;gap:8px;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);border-radius:99px;padding:5px 14px}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
    .logo-badge span{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--accent);letter-spacing:.08em;text-transform:uppercase}
    .card-title{font-family:"Space Grotesk",sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:28px;font-family:"IBM Plex Mono",monospace}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
    .input-wrap{position:relative}
    .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;width:16px;height:16px}
    .input-wrap input{width:100%;padding:12px 14px 12px 40px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:14px;font-family:"Inter",sans-serif;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
    .input-wrap input:focus{border-color:var(--accent);background:#0e0e12;box-shadow:0 0 0 3px rgba(0,229,255,0.12)}
    .input-wrap input::placeholder{color:var(--text-muted)}
    .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:var(--text-muted);display:flex;align-items:center;transition:color var(--transition)}
    .toggle-pw:hover{color:var(--text-secondary)}
    .toggle-pw svg{width:16px;height:16px}
    .error-banner{display:flex;align-items:center;gap:10px;background:rgba(255,42,85,0.1);border:1px solid rgba(255,42,85,0.3);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--critical);animation:shake .35s ease}
    @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
    .error-banner svg{width:16px;height:16px;flex-shrink:0}
    .btn-main{width:100%;margin-top:8px;padding:13px;background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,229,255,0.08));border:1px solid rgba(0,229,255,0.35);border-radius:10px;color:var(--accent);font-size:14px;font-weight:600;font-family:"Space Grotesk",sans-serif;letter-spacing:.04em;cursor:pointer;transition:background var(--transition),box-shadow var(--transition),transform var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-main:hover{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(0,229,255,0.15));box-shadow:0 0 20px rgba(0,229,255,0.25);transform:translateY(-1px)}
    .btn-main svg{width:16px;height:16px}
    .card-footer{margin-top:24px;padding-top:18px;border-top:1px solid var(--border);text-align:center;font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--text-muted)}
    .card-footer a{color:var(--accent);text-decoration:none}
    .card-footer a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">
    <div class="logo-wrap">
      <img src="/static/logo.png" alt="EDR PRO" />
      <div class="logo-badge"><span class="dot"></span><span>Create Account</span></div>
    </div>
    <p class="card-title">Register</p>
    <p class="card-sub">// new operator access request</p>

    {% if error %}
    <div class="error-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/register">
      <div class="field">
        <label>Email Address</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input type="email" name="email" placeholder="operator@domain.com" required />
        </div>
      </div>
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" id="pw-input" placeholder="min. 8 characters" required />
          <button type="button" class="toggle-pw" onclick="togglePw()">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-main">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        Create Account
      </button>
    </form>
    <div class="card-footer">
      Already have an account? <a href="/login">Sign in</a>
      <div style="margin-top: 15px; font-size: 10px; opacity: 0.5;">
        Developed by <a href="https://github.com/ahmaddahb36" target="_blank" style="color: inherit; text-decoration: none;">A7_GD</a>
      </div>
    </div>
  </div>
  <script>
    function togglePw(){
      const i=document.getElementById('pw-input'),e=document.getElementById('eye-icon'),h=i.type==='password';
      i.type=h?'text':'password';
      e.innerHTML=h?`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>``:`<path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
    }
  </script>
</body>
</html>
