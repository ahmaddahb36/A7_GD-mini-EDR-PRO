<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A7._.GD mini EDR PRO | Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--bg-base:#050505;--bg-surface:#0a0a0c;--bg-panel:#121214;--border:rgba(255,255,255,0.08);--border-highlight:rgba(255,255,255,0.15);--text-primary:#f4f4f5;--text-secondary:#a1a1aa;--text-muted:#71717a;--accent:#00e5ff;--critical:#ff2a55;--transition:0.3s cubic-bezier(0.4,0,0.2,1)}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",sans-serif;background:var(--bg-base);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;animation:gridPan 25s linear infinite}
    @keyframes gridPan{0%{background-position:0 0}100%{background-position:40px 40px}}
    .orb{position:fixed;z-index:0;border-radius:50%;filter:blur(80px);opacity:.12;pointer-events:none}
    .orb-1{width:400px;height:400px;background:var(--accent);top:-100px;left:-100px;animation:orbFloat 8s ease-in-out infinite alternate}
    .orb-2{width:300px;height:300px;background:#7c3aed;bottom:-80px;right:-80px;animation:orbFloat 11s ease-in-out infinite alternate-reverse}
    @keyframes orbFloat{from{transform:translate(0,0)}to{transform:translate(40px,30px)}}
    .card{position:relative;z-index:1;background:var(--bg-panel);border:1px solid var(--border-highlight);border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 0 0 1px rgba(0,229,255,0.06),0 24px 64px rgba(0,0,0,0.7);animation:cardIn .5s cubic-bezier(0.16,1,0.3,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    .icon-wrap svg{width:32px;height:32px;color:var(--accent)}
    .icon-wrap.invalid{background:rgba(255,42,85,0.08);border-color:rgba(255,42,85,0.2)}
    .icon-wrap.invalid svg{color:var(--critical)}
    .card-title{font-family:"Space Grotesk",sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:8px}
    .card-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:28px;line-height:1.6}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
    .input-wrap{position:relative}
    .input-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;width:16px;height:16px}
    .input-wrap input{width:100%;padding:12px 40px;background:var(--bg-surface);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-size:14px;font-family:"Inter",sans-serif;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
    .input-wrap input:focus{border-color:var(--accent);background:#0e0e12;box-shadow:0 0 0 3px rgba(0,229,255,0.12)}
    .input-wrap input::placeholder{color:var(--text-muted)}
    .btn-secondary:hover{border-color:var(--border-highlight);color:var(--text-primary)}
    
    .error-banner{display:flex;align-items:center;gap:10px;background:rgba(255,42,85,0.1);border:1px solid rgba(255,42,85,0.3);border-radius:10px;padding:12px 14px;margin-bottom:18px;font-size:13px;color:var(--critical)}
    .error-banner svg{width:16px;height:16px;flex-shrink:0}
    
    .btn-main{width:100%;margin-top:8px;padding:13px;background:linear-gradient(135deg,rgba(0,229,255,0.15),rgba(0,229,255,0.08));border:1px solid rgba(0,229,255,0.35);border-radius:10px;color:var(--accent);font-size:14px;font-weight:600;font-family:"Space Grotesk",sans-serif;letter-spacing:.04em;cursor:pointer;transition:background var(--transition),box-shadow var(--transition),transform var(--transition);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-main:hover{background:linear-gradient(135deg,rgba(0,229,255,0.25),rgba(0,229,255,0.15));box-shadow:0 0 20px rgba(0,229,255,0.25);transform:translateY(-1px)}
    .btn-main svg{width:16px;height:16px}
    
    .btn-secondary{width:100%;margin-top:12px;padding:12px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-secondary);font-size:14px;font-family:"Space Grotesk",sans-serif;cursor:pointer;transition:border-color var(--transition),color var(--transition);display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}

    /* ── Show Password Checkbox ───────────────────────────────────────── */
    .show-pw-wrap {
      display:flex; align-items:center; gap:10px; margin-top:-8px; margin-bottom:18px; cursor:pointer;
    }
    .show-pw-wrap input[type="checkbox"] {
      appearance:none; width:17px; height:17px; border:1.5px solid var(--border-highlight); border-radius:5px;
      background:rgba(255,255,255,0.02); cursor:pointer; position:relative; transition:all 0.2s ease;
    }
    .show-pw-wrap input[type="checkbox"]:checked {
      background:var(--accent); border-color:var(--accent); box-shadow:0 0 10px rgba(0,229,255,0.2);
    }
    .show-pw-wrap input[type="checkbox"]:checked::after {
      content:'✔'; position:absolute; color:var(--bg-base); font-size:11px; font-weight:900;
      top:50%; left:50%; transform:translate(-50%,-50%);
    }
    .show-pw-wrap label {
      font-size:11px; color:var(--text-muted); cursor:pointer; user-select:none;
      font-family:"IBM Plex Mono",monospace; letter-spacing:0.05em; font-weight:600;
    }
    .show-pw-wrap input[type="checkbox"]:checked + label { color:var(--accent); }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="card">

    {% if invalid %}
    <div class="icon-wrap invalid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    </div>
    <p class="card-title">Link Expired</p>
    <p class="card-sub">This reset link is invalid or has expired. Please request a new one.</p>
    <a href="/forgot" class="btn-main" style="text-decoration:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Request New Link
    </a>

    {% else %}
    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <p class="card-title">Set New Password</p>
    <p class="card-sub">Choose a strong password for your account.</p>

    {% if error %}
    <div class="error-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="/reset/{{ token }}">
      <div class="field">
        <label>New Password</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" name="password" id="pw-input" placeholder="min. 8 characters" required />
        </div>
      </div>
      <div class="show-pw-wrap">
        <input type="checkbox" id="show-pw-check" onclick="togglePw()">
        <label for="show-pw-check">SHOW PASSWORD</label>
      </div>
      <button type="submit" class="btn-main">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Save New Password
      </button>
    </form>
    {% endif %}

    <a href="/login" class="btn-secondary">← Back to login</a>
    <div style="margin-top: 25px; text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); opacity: 0.5;">
      Developed by <a href="https://github.com/ahmaddahb36" target="_blank" style="color: inherit; text-decoration: none;">A7_GD</a>
    </div>
  </div>
  <script>
    function togglePw(){
      const i=document.getElementById('pw-input'),c=document.getElementById('show-pw-check');
      i.type=c.checked?'text':'password';
    }
  </script>
</body>
</html>
